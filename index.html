<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sloth Anime</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1115;
    color: #fff;
}

header {
    text-align: center;
    padding: 18px;
    font-size: 1.8rem;
    background: #111827;
    color: #00bfff;
    cursor: pointer;
}

#ad {
    text-align: center;
    background: #ff4c4c;
    padding: 6px;
    font-size: 13px;
    font-weight: bold;
}

#searchBox {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
}

#searchInput {
    padding: 10px;
    width: 200px;
    border: none;
    border-radius: 8px;
    background: #16202c;
    color: #fff;
}

#searchBtn,
#watchBtnTop {
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    background: #00bfff;
    color: #000;
    cursor: pointer;
}

#sectionTitle {
    text-align: center;
    padding: 5px;
    font-size: 18px;
    color: #00bfff;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    padding: 12px;
}

.card {
    background: #16202c;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}

.card img {
    width: 100%;
    height: 210px;
    object-fit: cover;
}

.card-title {
    text-align: center;
    padding: 8px;
    font-size: 14px;
}

.watchBtn {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #00bfff;
    color: #000;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
}

#playerPage,
#watchlistPage {
    display: none;
    padding: 10px;
}

#player {
    width: 100%;
    height: 380px;
    border: none;
    border-radius: 10px;
}

.info {
    text-align: center;
    padding: 10px;
}

.info img {
    border-radius: 10px;
}

.back {
    display: inline-block;
    background: #16202c;
    color: #00bfff;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
    border: 1px solid #00bfff;
}

.emptyMsg {
    text-align: center;
    color: #00bfff;
    font-size: 16px;
    padding: 20px;
}
</style>
</head>

<body>

<div id="ad">USE ADBLOCK FOR BEST EXPERIENCE</div>
<header onclick="headerClick()">SLOTH ANIME</header>

<div id="searchBox">
    <input id="searchInput" placeholder="Search anime">
    <button id="searchBtn">Search</button>
    <button id="watchBtnTop">Watchlist</button>
</div>

<div id="sectionTitle">TRENDING</div>
<div id="home" class="grid"></div>

<div id="watchlistPage">
    <h2 style="text-align:center;color:#00bfff">WATCHLIST</h2>
    <div id="watchlist" class="grid"></div>
</div>

<div id="playerPage">
    <div class="back" onclick="goHome()">Back</div>
    <iframe id="player" allowfullscreen></iframe>
    <div class="info">
        <img id="cover" width="140"><br>
        <h2 id="title"></h2>
        <p id="desc"></p>
    </div>
    <h3 style="text-align:center;">Recommendations</h3>
    <div id="recs" class="grid"></div>
</div>

<script>
const API = "https://graphql.anilist.co";

const homeDiv = document.getElementById("home");
const playerPage = document.getElementById("playerPage");
const watchlistPage = document.getElementById("watchlistPage");
const player = document.getElementById("player");
const watchlistDiv = document.getElementById("watchlist");

let lastQuery = "";
let lastResults = [];
let isSearchMode = false;
let watchlistOpen = false;
let cache = {};
let watchlist = JSON.parse(localStorage.getItem("watchlist") || "[]");

document.getElementById("searchBtn").onclick = handleSearch;
document.getElementById("watchBtnTop").onclick = toggleWatchlist;
document.getElementById("searchInput").addEventListener("keypress", e => {
    if (e.key === "Enter") handleSearch();
});

function headerClick() {
    goHome();
}

function isInWatchlist(id) {
    return watchlist.some(x => x.id === id);
}

function saveWatchlist() {
    localStorage.setItem("watchlist", JSON.stringify(watchlist));
    renderWatchlist();
    refreshButtons();
}

function toggleWatch(a) {
    if (isInWatchlist(a.id)) {
        watchlist = watchlist.filter(x => x.id !== a.id);
    } else {
        watchlist.push(a);
    }
    saveWatchlist();
}

function renderWatchlist(filter = "") {
    watchlistDiv.innerHTML = "";
    let list = watchlist.filter(a => a.title.romaji.toLowerCase().includes(filter.toLowerCase()));
    if (list.length === 0) {
        watchlistDiv.innerHTML = '<div class="emptyMsg">Empty</div>';
        return;
    }
    list.forEach(a => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<div class="watchBtn">-</div>
                         <img src="${a.coverImage.large}">
                         <div class="card-title">${a.title.romaji}</div>`;
        div.querySelector(".watchBtn").onclick = (e) => {
            e.stopPropagation();
            toggleWatch(a);
        };
        div.onclick = () => openAnime(a.id);
        watchlistDiv.appendChild(div);
    });
}

function refreshButtons() {
    document.querySelectorAll(".card").forEach(card => {
        let title = card.querySelector(".card-title");
        let btn = card.querySelector(".watchBtn");
        if (!title || !btn) return;
        let anime = watchlist.find(a => a.title.romaji === title.innerText);
        btn.innerText = anime ? "-" : "+";
    });
}

function goHome() {
    watchlistOpen = false;
    homeDiv.style.display = "grid";
    playerPage.style.display = "none";
    watchlistPage.style.display = "none";
    player.src = "";
    document.getElementById("searchBox").style.display = "flex";
    document.getElementById("sectionTitle").style.display = "block";
    document.querySelector("header").style.display = "block";
    document.getElementById("ad").style.display = "block";
    homeDiv.innerHTML = "";

    if (isSearchMode) {
        lastResults.forEach(createCard);
        document.getElementById("searchInput").value = lastQuery;
        document.getElementById("sectionTitle").innerText = "RESULTS";
    } else {
        document.getElementById("searchInput").value = "";
        document.getElementById("sectionTitle").innerText = "TRENDING";
        trending();
    }

    refreshButtons();
    window.scrollTo(0, 0);
}

function toggleWatchlist() {
    watchlistOpen = !watchlistOpen;
    if (watchlistOpen) {
        homeDiv.style.display = "none";
        playerPage.style.display = "none";
        watchlistPage.style.display = "block";
        document.getElementById("sectionTitle").style.display = "none";
        renderWatchlist();
    } else {
        goHome();
    }
}

function handleSearch() {
    let q = document.getElementById("searchInput").value.trim();
    if (watchlistOpen) {
        renderWatchlist(q);
        return;
    }
    search();
}

async function fetchAPI(query, variables = {}) {
    let key = query + JSON.stringify(variables);
    if (cache[key]) return cache[key];
    let res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, variables })
    });
    let data = (await res.json()).data;
    cache[key] = data;
    return data;
}

function createCard(a) {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div class="watchBtn">${isInWatchlist(a.id) ? "-" : "+"}</div>
                     <img src="${a.coverImage.large}">
                     <div class="card-title">${a.title.romaji}</div>`;
    div.querySelector(".watchBtn").onclick = (e) => {
        e.stopPropagation();
        toggleWatch(a);
    };
    div.onclick = () => openAnime(a.id);
    homeDiv.appendChild(div);
}

async function trending() {
    homeDiv.innerHTML = "";
    isSearchMode = false;
    lastResults = [];
    lastQuery = "";
    document.getElementById("sectionTitle").innerText = "TRENDING";

    let q = `query {
        Page(perPage:30) {
            media(type:ANIME, sort:[TRENDING_DESC, POPULARITY_DESC], isAdult:false) {
                id
                title { romaji }
                coverImage { large }
                averageScore
                popularity
            }
        }
    }`;

    let data = await fetchAPI(q);
    let filtered = data.Page.media.filter(a => a.averageScore >= 65 && a.popularity >= 20000);
    filtered.sort((a, b) => (b.popularity + b.averageScore * 1000) - (a.popularity + a.averageScore * 1000));
    filtered.forEach(createCard);
    refreshButtons();
}

async function search() {
    let q = document.getElementById("searchInput").value.trim();
    if (!q) {
        isSearchMode = false;
        trending();
        return;
    }
    lastQuery = q;
    isSearchMode = true;
    homeDiv.innerHTML = "";
    document.getElementById("sectionTitle").innerText = "RESULTS";

    let query = `query($q:String){
        Page(perPage:24){
            media(search:$q,type:ANIME){
                id
                title { romaji }
                coverImage { large }
            }
        }
    }`;

    let data = await fetchAPI(query, { q });
    lastResults = data.Page.media;
    data.Page.media.forEach(createCard);
    refreshButtons();
}

async function openAnime(id) {
    window.scrollTo({ top: 0, behavior: "smooth" });

    homeDiv.style.display = "none";
    watchlistPage.style.display = "none";
    playerPage.style.display = "block";
    document.getElementById("searchBox").style.display = "none";
    document.getElementById("sectionTitle").style.display = "none";
    document.querySelector("header").style.display = "none";
    document.getElementById("ad").style.display = "none";

    player.src = `https://player.videasy.net/anime/${id}?episodeSelector=true&nextEpisode=true&autoplayNextEpisode=true`;

    let q = `query($id:Int){
        Media(id:$id){
            title { romaji }
            description
            coverImage { large }
            recommendations {
                nodes {
                    mediaRecommendation {
                        id
                        title { romaji }
                        coverImage { large }
                    }
                }
            }
        }
    }`;

    let data = await fetchAPI(q, { id });

    document.getElementById("title").innerText = data.Media.title.romaji;
    document.getElementById("desc").innerHTML = data.Media.description;
    document.getElementById("cover").src = data.Media.coverImage.large;

    let recs = document.getElementById("recs");
    recs.innerHTML = "";

    data.Media.recommendations.nodes.forEach(n => {
        let a = n.mediaRecommendation;
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<img src="${a.coverImage.large}">
                         <div class="card-title">${a.title.romaji}</div>`;
        div.onclick = () => openAnime(a.id);
        recs.appendChild(div);
    });
}


trending();
</script>

</body>
</html>
